name: Transcribe

on:
  schedule:
    - cron: '0 19 * * 0'  # Sunday 19:00 UTC = 22:00 MSK
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: transcribe
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # GHA hard limit is 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install --quiet kaggle pyyaml

      - name: Trigger Kaggle and pull results
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python scripts/trigger_kaggle.py

      - name: Commit transcripts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add transcripts/ videos.yml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "transcripts: weekly run $(date -u +%Y-%m-%d)"
            git push
          fi
